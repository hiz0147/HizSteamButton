name: Package Extension

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./extension/manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: echo "exists=$([ -z \"$(git tag -l v${{ steps.version.outputs.version }})\" ] && echo false || echo true)" >> $GITHUB_OUTPUT

      - name: Create extension zip
        if: steps.check.outputs.exists == 'false'
        run: cd extension && zip -r ../hizsteambutton.zip .

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: hizsteambutton.zip
          generate_release_notes: true
